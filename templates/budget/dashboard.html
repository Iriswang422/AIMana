<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI体验中心预算追踪</title>
    <link rel="stylesheet" href="/static/css/budget.css">
</head>
<body>
    <div class="budget-container">
        <header class="budget-header">
            <h1>AI体验中心预算追踪</h1>
            <div class="header-actions">
                <select id="filter-project" class="filter-select">
                    <option value="">全部项目</option>
                </select>
                <select id="filter-tag" class="filter-select">
                    <option value="">全部Tag</option>
                </select>
                <select id="filter-owner" class="filter-select">
                    <option value="">全部负责人</option>
                </select>
                <button id="import-btn" class="btn btn-primary">导入Excel</button>
                <button id="refresh-btn" class="btn btn-icon" title="刷新">&#x21bb;</button>
            </div>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="budget">预算数</button>
            <button class="tab-btn" data-tab="comparison">预实对比</button>
            <button class="tab-btn" data-tab="actuals">实际数</button>
        </nav>

        <div id="risk-summary" class="risk-summary" style="display:none;"></div>

        <main class="tab-content">
            <div id="budget-tab" class="tab-pane active">
                <div class="table-scroll">
                    <table id="budget-table" class="excel-table">
                        <thead><tr></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div id="comparison-tab" class="tab-pane">
                <div class="table-scroll">
                    <table id="comparison-table" class="excel-table">
                        <thead><tr></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div id="actuals-tab" class="tab-pane">
                <div class="table-scroll">
                    <table id="actuals-table" class="excel-table">
                        <thead><tr></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="import-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>导入预算Excel</h3>
            <p class="modal-hint">支持3页签格式：预算数 / 预实对比 / 实际数</p>
            <input type="file" id="import-file" accept=".xlsx,.xls">
            <div id="import-preview"></div>
            <div id="import-status"></div>
            <div class="modal-actions">
                <button id="preview-btn" class="btn btn-secondary">预览</button>
                <button id="confirm-import-btn" class="btn btn-primary">确认导入</button>
                <button class="btn" onclick="document.getElementById('import-modal').style.display='none'">取消</button>
            </div>
        </div>
    </div>

    <div id="reason-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>编辑变动理由</h3>
            <p id="reason-context"></p>
            <textarea id="reason-input" rows="3" placeholder="请输入变动理由..."></textarea>
            <div class="modal-actions">
                <button id="save-reason-btn" class="btn btn-primary">保存</button>
                <button class="btn" onclick="document.getElementById('reason-modal').style.display='none'">取消</button>
            </div>
        </div>
    </div>

    <script src="/static/js/budget/api.js"></script>
    <script src="/static/js/budget/app.js"></script>
</body>
</html>
